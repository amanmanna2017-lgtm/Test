services:
  - type: web
    name: drx-api
    runtime: image
    buildCommand: |
      apt-get update && apt-get install -y gcc python3 python3-pip
      pip3 install flask gunicorn
      gcc khalnayak.c -o khalnayak -lpthread -O3
    startCommand: gunicorn server:app --bind 0.0.0.0:8080
    envVars:
      - key: API_KEY
        sync: false

  - type: worker
    name: drx-bot
    runtime: python
    buildCommand: pip install telebot requests
    startCommand: python3 bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: API_KEY
        sync: false
      - key: API_URL
        sync: false
